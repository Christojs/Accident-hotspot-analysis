                fillColor: '#f03',
                fillOpacity: 0.5,
                radius: 1000 // Increased radius in meters (change as needed)
            }).addTo(map);
        });

        // Add markers for each hospital
        hospitals.forEach(hospital => {
            L.marker([hospital.lat, hospital.lng]).addTo(map);
        });

        // Add a movable vehicle marker
        const vehicleIcon = L.divIcon({ className: 'vehicle-icon', html: '🚗', iconSize: [20, 20] });
        const vehicle = L.marker([10.8505, 76.2711], { icon: vehicleIcon, draggable: true }).addTo(map);

        // Function to find the nearest hospital
        function findNearestHospital(vehicleLatLng) {
            let nearestHospital = null;
            let minDistance = Infinity;

            hospitals.forEach(hospital => {
                const distance = map.distance(
                    [vehicleLatLng.lat, vehicleLatLng.lng],
                    [hospital.lat, hospital.lng]
                );
                if (distance < minDistance) {
                    minDistance = distance;
                    nearestHospital = hospital;
                }
            });
            return nearestHospital;
        }

        // Check if the vehicle is within a hotspot area whenever it’s moved
        vehicle.on('move', () => {
            const vehicleLatLng = vehicle.getLatLng();
            hotspots.forEach(hotspot => {
                const distance = map.distance([hotspot.lat, hotspot.lng], [vehicleLatLng.lat, vehicleLatLng.lng]);
                if (distance < 1000) { // Adjusted to match the new circle radius
                    const nearestHospital = findNearestHospital(vehicleLatLng);
                    alert(`Accident Hotspot Alert!\nNearest Hospital Location: ${nearestHospital.lat}, ${nearestHospital.lng}`);

            });
